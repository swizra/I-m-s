spring.application.name=inventory-management-system
server.port=${SERVER_PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/inventorydb}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

springdoc.swagger-ui.path=${SPRINGDOC_SWAGGER_UI_PATH:/swagger-ui.html}

management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}

security.jwt.secret=${SECURITY_JWT_SECRET:inventory-management-system-demo-secret-key-2026-change-me}
security.jwt.issuer=${SECURITY_JWT_ISSUER:http://localhost:${SERVER_PORT:8080}}
security.jwt.access-token-ttl=${SECURITY_JWT_ACCESS_TOKEN_TTL:PT1H}

app.live-updates.sse-timeout-ms=${APP_LIVE_UPDATES_SSE_TIMEOUT_MS:900000}
app.orders.estimated-ready-base-minutes=${APP_ORDERS_ESTIMATED_READY_BASE_MINUTES:45}
app.orders.estimated-ready-per-item-minutes=${APP_ORDERS_ESTIMATED_READY_PER_ITEM_MINUTES:12}
